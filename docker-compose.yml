version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: syncforge-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: .
    container_name: syncforge-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongo
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/syncforge
    restart: always

volumes:
  mongo-data: